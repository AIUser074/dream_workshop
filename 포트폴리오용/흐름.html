<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            font-family: -apple-system, sans-serif; 
            background-color: #121212; 
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .flow-container { 
            background: #1e1e1e; 
            padding: 40px; 
            border-radius: 12px; 
            border: 1px solid #333; 
            text-align: center; 
        }
        .flow-wrapper {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 30px;
        }
        .step { 
            background: #2a2a2a; 
            border: 2px solid #58c4dc; 
            border-radius: 8px; 
            padding: 20px 15px; 
            width: 140px; 
            height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            font-weight: bold; 
            letter-spacing: 0.5px; 
            font-size: 14px;
        }
        .step.vision { border-color: #f5a623; color: #f5a623; }
        .step.client { border-color: #4caf50; color: #4caf50; }
        .step.text { border-color: #e91e63; color: #e91e63; }
        .arrow { 
            font-size: 28px; 
            color: #666; 
            font-weight: bold;
        }
        .desc { 
            font-size: 15px; 
            color: #aaa; 
            margin-top: 8px; 
            font-weight: normal; 
            line-height: 1.3;
        }
    </style>
</head>
<body>
<div class="flow-container">
    <h3 style="color: #58c4dc; margin: 0 0 10px 0; font-size: 24px;">🔄 2-Step 하이브리드 LLM 파이프라인</h3>

    <div class="flow-wrapper">
        <div class="step client">🎨 1. HTML5 Canvas<div class="desc">유저 드로잉 완료</div></div>
        <div class="arrow">→</div>
        
        <div class="step client">✂️ 2. Preprocess<div class="desc">Crop + Resize<br>JPEG 압축</div></div>
        <div class="arrow">→</div>
        
        <div class="step">☁️ 3. API Proxy<div class="desc">CORS 방어<br>API Key 주입</div></div>
        <div class="arrow">→</div>
        
        <div class="step vision">👁️ 4. ANALYZE<div class="desc">객관적 사실만 JSON(T/F) 추출</div></div>
        <div class="arrow">→</div>
        
        <div class="step client">⚙️ 5. Client Scoring<div class="desc">JSON 기반으로<br>성공/보상 판정</div></div>
        <div class="arrow">→</div>
        
        <div class="step text">💬 6. CREATE<div class="desc">판정 결과 기반<br>반응 1줄 텍스트 생성</div></div>
    </div>
</div>
</body>
</html>
